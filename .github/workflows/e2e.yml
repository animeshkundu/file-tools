name: Firefox E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  firefox:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Firefox extension
        run: npm run build:firefox

      # Installs the system libraries a real Firefox needs on the runner. The
      # harness itself downloads Firefox + geckodriver via Selenium Manager
      # (global-setup.ts); this step only provisions the shared OS dependencies.
      - name: Install Firefox and system dependencies
        run: npx playwright install --with-deps firefox

      - name: Run real-Firefox end-to-end tests
        run: npm run test:e2e

      # test:e2e already fails the job on a failing spec. This guard closes the
      # gap where the suite exits 0 while the real-browser flows were skipped or
      # fewer specs ran than expected — a green light with nothing behind it.
      - name: Assert E2E specs actually executed (anti-false-green)
        run: node tests/e2e/assert-e2e-ran.mjs

      - name: Upload E2E report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: file-tools-e2e-report
          path: |
            e2e-results.json
            playwright-report/
          if-no-files-found: warn
