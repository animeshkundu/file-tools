name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release checks
        run: npm run check

      - name: Package Chrome extension
        run: npm run zip

      - name: Package Firefox extension and sources
        run: npm run zip:firefox

      # Configure FIREFOX_EXTENSION_ID, FIREFOX_JWT_ISSUER, and
      # FIREFOX_JWT_SECRET as repository Actions secrets.
      - name: Publish listed extension to Firefox AMO
        env:
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
        run: |
          npx wxt submit \
            --firefox-zip .output/*-firefox.zip \
            --firefox-sources-zip .output/*-sources.zip \
            --firefox-channel listed

      # Optional. Set the repository variable PUBLISH_CHROME to true and add
      # all four referenced Chrome credentials as repository Actions secrets.
      - name: Publish to Chrome Web Store
        if: ${{ vars.PUBLISH_CHROME == 'true' }}
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: npx wxt submit --chrome-zip .output/*-chrome.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .output/*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
