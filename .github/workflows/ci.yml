name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build Chrome extension
        run: npm run build

      - name: Accessibility gate (WCAG 2.1 AA)
        run: |
          npx serve .output/chrome-mv3 -l 4173 --no-clipboard > /tmp/serve.log 2>&1 &
          for i in {1..20}; do
            if curl --fail --silent http://127.0.0.1:4173/app.html > /dev/null; then
              break
            fi
            sleep 1
          done
          node tests/a11y/run-axe-gate.mjs http://127.0.0.1:4173/app.html

      - name: Build Firefox extension
        run: npm run build:firefox

      - name: Verify built manifest CSP
        run: node scripts/verify-csp.mjs

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: file-tools-builds
          path: .output/
          include-hidden-files: true
          if-no-files-found: error
