name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build Chrome extension
        run: npm run build

      - name: Accessibility gate (WCAG 2.1 AA)
        run: |
          PORT=4173
          TARGET_URL="http://127.0.0.1:${PORT}/app.html"
          MAX_RETRIES=20
          npx serve .output/chrome-mv3 -l ${PORT} --no-clipboard > /tmp/serve.log 2>&1 &
          SERVER_PID=$!
          trap "kill ${SERVER_PID} 2>/dev/null || true" EXIT
          SERVER_READY=false
          for i in $(seq 1 ${MAX_RETRIES}); do
            if curl --fail --silent "${TARGET_URL}" > /dev/null; then
              SERVER_READY=true
              break
            fi
            sleep 1
          done
          if [ "${SERVER_READY}" != "true" ]; then
            echo "Static server did not become ready at ${TARGET_URL}" >&2
            cat /tmp/serve.log >&2 || true
            exit 1
          fi
          node tests/a11y/run-axe-gate.mjs "${TARGET_URL}"

      - name: Build Firefox extension
        run: npm run build:firefox

      - name: Verify the built bundle makes no network calls
        run: |
          set -euo pipefail
          for target in chrome-mv3 firefox-mv3; do
            dir=".output/${target}"
            js_count=$(find "$dir" -name '*.js' 2>/dev/null | wc -l | tr -d ' ')
            if [ "$js_count" -eq 0 ]; then
              echo "No built JavaScript found in ${dir} to scan" >&2
              exit 1
            fi
            if grep -R -n -E 'fetch\(|XMLHttpRequest|WebSocket|sendBeacon|EventSource' "$dir" --include='*.js'; then
              echo "ERROR: a network primitive appears in ${dir} above." >&2
              exit 1
            fi
            echo "OK: ${target} — scanned ${js_count} JS files, no network primitives."
          done

      - name: Verify built manifest CSP
        run: node scripts/verify-csp.mjs

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: file-tools-builds
          path: .output/
          include-hidden-files: true
          if-no-files-found: error
